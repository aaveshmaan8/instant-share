<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>InstantShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='logo.svg') }}">
</head>

<body>

    <main class="container">

        <!-- Theme Toggle -->
        <div class="theme-toggle">
            <button id="themeToggle" aria-label="Toggle Theme">🌙</button>
        </div>

        <!-- Logo -->
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="InstantShare Logo">
            <span class="logo-text">InstantShare</span>
        </div>

        <p class="subtitle">Secure • Temporary • Anonymous</p>

        <!-- ================= TABS ================= -->
        <div class="top-tabs">
            <button id="uploadTab" class="top-tab active" onclick="switchTab('upload')">
                ↑ Upload
            </button>
            <button id="downloadTab" class="top-tab" onclick="switchTab('download')">
                ↓ Download
            </button>
        </div>

        <!-- ================= UPLOAD SECTION ================= -->
        <section id="upload" class="tab-content active">

            <form id="uploadForm">

                <!-- Drop Area -->
                <div id="dropArea" class="drop-area">

                    <!-- Default State -->
                    <div id="dropDefault">
                        <p class="drop-title">Drag & Drop files here</p>
                        <p class="or-text">or</p>

                        <label class="file-label">
                            Select Files
                            <input type="file" name="file" id="fileInput" multiple hidden>
                        </label>
                    </div>

                    <!-- Preview State -->
                    <div id="dropPreview" class="hidden">
                        <div id="fileName"></div>
                    </div>

                </div>

                <!-- Progress -->
                <div id="progressContainer" class="progress-container hidden">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <button type="submit" class="primary-btn">
                    Generate Download Code
                </button>

            </form>

            <!-- ================= RESULT BOX ================= -->
            <div id="resultBox" class="success-box hidden">

                <div id="generatedCode"></div>

                <div id="fileCount" class="file-count"></div>

                <img id="qrImage" alt="QR Code">

                <p class="expiry-text">
                    Expires in <span id="countdown">05:00</span>
                </p>

            </div>

        </section>

        <!-- ================= DOWNLOAD SECTION ================= -->
        <section id="download" class="tab-content">

            <form action="/download" method="POST" class="download-form">
                <input type="text" name="code" placeholder="Enter 6-digit code" required>
                <button type="submit" class="primary-btn">
                    Download File
                </button>
            </form>

        </section>

        <!-- ================= FOOTER ================= -->
        <footer class="footer">
            © {{ 2026 }} InstantShare • Made with ❤️ by <span>Aavesh Maan</span>
        </footer>

    </main>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
